<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THREADS'26 | Event-wise Export</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <style>
        body { background: #f8fafc; font-family: 'Inter', sans-serif; }
        .container { max-width: 600px; margin-top: 50px; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 8px 32px rgba(0,0,0,0.05); }
        .btn-primary { background: #6366f1; border: none; padding: 12px; }
        .btn-primary:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h4 class="fw-bold text-primary">THREADS'26</h4>
                <p class="text-muted">Event-wise Export Tool</p>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Select Event</label>
                <select id="eventSelect" class="form-select">
                    <option value="">Loading events...</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Export Type</label>
                <select id="exportTypeSelect" class="form-select">
                    <option value="summary">Summary Report (Counts Only)</option>
                    <option value="detailed">Detailed Report (All Registrations)</option>
                    <option value="attendance">Attendance List</option>
                    <option value="payment">Payment Status Report</option>
                </select>
            </div>

            <button class="btn btn-primary w-100" onclick="exportEventWiseData()">
                <i class="bi bi-download me-2"></i> Generate Export
            </button>

            <div id="alertContainer" class="mt-3"></div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_KEY = '7f8e3a1b9c4d2e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f';
        const BASE_URL = 'https://threads26-2-fdem.onrender.com/api';

        let allEvents = [];
        let allRegistrations = [];

        async function apiFetch(endpoint) {
            const response = await fetch(`${BASE_URL}${endpoint}`, {
                headers: { 'x-api-key': API_KEY }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return response.json();
        }

        async function loadEvents() {
            try {
                const data = await apiFetch('/events');
                allEvents = data.events;
                const select = document.getElementById('eventSelect');
                select.innerHTML = '<option value="">Choose an event...</option>' +
                    allEvents.map(e => `<option value="${e.event_id}">${e.event_name} (Day ${e.day})</option>`).join('');
            } catch (error) {
                showAlert('Failed to load events: ' + error.message, 'danger');
            }
        }

        async function loadRegistrations() {
            try {
                allRegistrations = await apiFetch('/admin/registrations');
            } catch (error) {
                showAlert('Failed to load registrations: ' + error.message, 'danger');
            }
        }

        async function exportEventWiseData() {
            const eventId = document.getElementById('eventSelect').value;
            const exportType = document.getElementById('exportTypeSelect').value;
            
            if (!eventId) {
                showAlert('Please select an event', 'warning');
                return;
            }

            try {
                if (allEvents.length === 0) await loadEvents();
                if (allRegistrations.length === 0) await loadRegistrations();

                const event = allEvents.find(e => e.event_id == eventId);
                const eventRegistrations = allRegistrations.filter(r => r.event_id == eventId);

                let csv = '';
                let filename = '';

                switch(exportType) {
                    case 'summary':
                        csv = generateSummaryReport(event, eventRegistrations);
                        filename = `${event.event_name.replace(/\s+/g, '_')}_summary.csv`;
                        break;
                    case 'detailed':
                        csv = generateDetailedReport(eventRegistrations);
                        filename = `${event.event_name.replace(/\s+/g, '_')}_detailed.csv`;
                        break;
                    case 'attendance':
                        csv = generateAttendanceReport(eventRegistrations);
                        filename = `${event.event_name.replace(/\s+/g, '_')}_attendance.csv`;
                        break;
                    case 'payment':
                        csv = generatePaymentReport(eventRegistrations);
                        filename = `${event.event_name.replace(/\s+/g, '_')}_payment.csv`;
                        break;
                }

                const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                window.URL.revokeObjectURL(url);
                
                showAlert(`Export successful: ${filename}`, 'success');
            } catch (error) {
                showAlert('Export failed: ' + error.message, 'danger');
            }
        }

        function generateSummaryReport(event, registrations) {
            const total = registrations.length;
            const verified = registrations.filter(r => r.verification_status?.includes('VERIFIED')).length;
            const paid = registrations.filter(r => r.payment_status === 'Success').length;
            const attended = registrations.filter(r => r.attendance_status === 'ATTENDED').length;

            const collegeStats = {};
            registrations.forEach(r => {
                collegeStats[r.college_name] = (collegeStats[r.college_name] || 0) + 1;
            });

            let csv = 'THREADS\'26 EVENT SUMMARY REPORT\n';
            csv += `Event,${event.event_name}\n`;
            csv += `Day,${event.day}\n`;
            csv += `Total Seats,${event.total_seats}\n`;
            csv += `Available Seats,${event.available_seats}\n`;
            csv += `Registration Fee,₹${event.fee}\n\n`;
            
            csv += 'STATISTICS\n';
            csv += `Total Registrations,${total}\n`;
            csv += `Verified,${verified}\n`;
            csv += `Paid,${paid}\n`;
            csv += `Attended,${attended}\n`;
            csv += `Revenue,₹${paid * event.fee}\n\n`;
            
            csv += 'COLLEGE-WISE BREAKDOWN\n';
            csv += 'College Name,Count\n';
            Object.entries(collegeStats).sort((a,b) => b[1] - a[1]).forEach(([college, count]) => {
                csv += `"${college}",${count}\n`;
            });
            
            return csv;
        }

        function generateDetailedReport(registrations) {
            let csv = 'Registration ID,Name,Email,Phone,College,Department,Year,Payment Status,Verification Status,Attendance Status,Amount Paid\n';
            
            registrations.forEach(r => {
                csv += [
                    r.registration_unique_id,
                    `"${r.full_name}"`,
                    r.email,
                    r.phone,
                    `"${r.college_name}"`,
                    `"${r.department}"`,
                    r.year_of_study,
                    r.payment_status,
                    r.verification_status || 'UNVERIFIED',
                    r.attendance_status || 'NOT ATTENDED',
                    r.amount_paid || 0
                ].join(',') + '\n';
            });
            
            return csv;
        }

        function generateAttendanceReport(registrations) {
            let csv = 'Registration ID,Name,Email,College,Attendance Status\n';
            
            registrations.forEach(r => {
                csv += [
                    r.registration_unique_id,
                    `"${r.full_name}"`,
                    r.email,
                    `"${r.college_name}"`,
                    r.attendance_status || 'NOT ATTENDED'
                ].join(',') + '\n';
            });
            
            return csv;
        }

        function generatePaymentReport(registrations) {
            let csv = 'Registration ID,Name,Email,Payment Status,Amount,Transaction ID\n';
            
            registrations.forEach(r => {
                csv += [
                    r.registration_unique_id,
                    `"${r.full_name}"`,
                    r.email,
                    r.payment_status,
                    r.amount_paid || 0,
                    r.transaction_id || 'N/A'
                ].join(',') + '\n';
            });
            
            return csv;
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) alert.remove();
            }, 5000);
        }

        // Load events on page load
        loadEvents();
    </script>
</body>
</html>
